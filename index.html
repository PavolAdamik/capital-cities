<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hádaj hlavné mesto 🌍</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --error: #cf6679;
            --success: #03dac6;
            --warning: #ffb74d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .screen { display: none; width: 100%; max-width: 500px; flex-direction: column; gap: 20px; }
        .screen.active { display: flex; }

        h1 { text-align: center; color: var(--primary); margin-bottom: 10px; }

        .card {
            background-color: var(--surface);
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
        }

        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #000;
            color: #fff;
            font-size: 16px;
        }

        .player-inputs {
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #1a1a1a;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background-color: var(--primary);
            color: #000;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .action-buttons { display: flex; gap: 10px; }
        .btn-secondary { background-color: #333; color: #fff; }
        .btn-pause { background-color: var(--warning); color: #000; width: auto; padding: 5px 12px; font-size: 14px; margin: 0; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            padding: 15px;
            border-radius: 12px;
            gap: 10px;
        }

        .country-display { font-size: 28px; font-weight: bold; margin: 20px 0; color: #fff; }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            display: none; /* Skryté pri novej otázke */
        }

        .feedback.success { display: block !important; background: rgba(3, 218, 198, 0.2); color: var(--success); border: 1px solid var(--success); }
        .feedback.error { display: block !important; background: rgba(207, 102, 121, 0.2); color: var(--error); border: 1px solid var(--error); }

        .correct-answer-text { color: #fff; text-decoration: underline; font-size: 20px; display: block; margin-top: 5px; }

        .score-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .score-item { flex: 1 1 45%; background: var(--surface); padding: 10px; border-radius: 8px; text-align: center; font-size: 14px; }
        .active-player { border: 2px solid var(--primary); color: var(--primary); }

        .timer { font-size: 20px; font-weight: bold; min-width: 60px; text-align: right; }
        .timer.warning { color: var(--error); }

        #pause-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--surface);
            border-radius: 16px;
            z-index: 10;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: var(--warning);
        }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen active">
        <h1>🌍 Svetový Kvíz</h1>
        <div class="card">
            <label>Počet hráčov:</label>
            <input type="number" id="playerCount" value="2" min="1" max="10" oninput="generatePlayerInputs()">
            <div id="playerNamesContainer" class="player-inputs"></div>

            <label>Kontinent:</label>
            <select id="continentFilter">
                <option value="All">Celý svet</option>
                <option value="Europe">Európa</option>
                <option value="Asia">Ázia</option>
                <option value="Africa">Afrika</option>
                <option value="Americas">Ameriky</option>
                <option value="Oceania">Oceánia</option>
            </select>
            <button onclick="startGame()">Štart</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="header">
            <div id="currentPlayerDisplay" style="font-weight: bold; flex-grow: 1;">...</div>
            <div id="timerDisplay" class="timer">⏱️ 50</div>
            <button id="pauseBtn" class="btn-pause" onclick="togglePause()">⏸ Pauza</button>
            <button onclick="confirmEndGame()" style="width:auto; padding:5px 10px; margin:0; font-size:12px; background:var(--error); border-radius: 5px;">Koniec</button>
        </div>

        <div class="card">
            <div id="pause-overlay">HRA POZASTAVENÁ</div>
            <div id="cardsLeft" style="font-size:12px; color:var(--text-muted)"></div>
            <div id="game-content">
                <div class="country-display" id="countryName">...</div>
                <input type="text" id="capitalInput" placeholder="Napíš hlavné mesto..." autocomplete="off">
                <div id="actionButtons" class="action-buttons">
                    <button class="btn-secondary" onclick="giveUp()">Neviem</button>
                    <button id="submitBtn" onclick="checkAnswer()">Overiť</button>
                </div>
            </div>
            <div id="feedbackBox" class="feedback"></div>
        </div>
        <div class="score-grid" id="scoreGrid"></div>
    </div>

    <div id="end-screen" class="screen">
        <h1>🏆 Konečné poradie</h1>
        <div id="finalScoreList" class="card"></div>
        <button onclick="location.reload()">Nová hra</button>
    </div>

let players = [], currentPlayerIndex = 0, deck = [], currentCountry = null;
let timerInterval, timeLeft = 50, isAnswerChecked = false, isPaused = false;

function generatePlayerInputs() {
    const container = document.getElementById('playerNamesContainer');
    const count = document.getElementById('playerCount').value;
    container.innerHTML = '';
    for(let i = 1; i <= count; i++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = `Meno hráča ${i}`;
        input.id = `pName${i}`;
        container.appendChild(input);
    }
}
generatePlayerInputs();

document.getElementById('capitalInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter' && !isAnswerChecked && !isPaused) {
        checkAnswer();
    }
});

function normalize(str) {
    return str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]/g, "").toLowerCase() : "";
}

function startGame() {
    const count = document.getElementById('playerCount').value;
    const cont = document.getElementById('continentFilter').value;
    players = [];
    for(let i = 1; i <= count; i++) {
        const nameVal = document.getElementById(`pName${i}`).value.trim();
        players.push({ name: nameVal || `Hráč ${i}`, score: 0 });
    }
    deck = allCountries.filter(c => cont === "All" || c.continent === cont);
    deck.sort(() => Math.random() - 0.5);
    document.getElementById('setup-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');
    nextTurn();
}

function nextTurn() {
    if (deck.length === 0) return endGame();
    
    // RESET STAVU OTÁZKY
    isAnswerChecked = false;
    isPaused = false;
    currentCountry = deck.pop();
    timeLeft = 50;
    
    // KOMPLETNÝ RESET FEEDBACK BOXU (Odstránenie tried aj textu)
    const feedbackBox = document.getElementById('feedbackBox');
    feedbackBox.style.display = 'none';
    feedbackBox.innerHTML = '';
    feedbackBox.classList.remove('success', 'error');

    // RESET UI
    document.getElementById('pauseBtn').innerText = "⏸ Pauza";
    document.getElementById('pause-overlay').style.display = 'none';
    document.getElementById('game-content').style.opacity = '1';
    document.getElementById('actionButtons').style.display = 'flex';
    
    const input = document.getElementById('capitalInput');
    input.disabled = false;
    input.value = '';
    input.focus();
    
    document.getElementById('countryName').innerText = currentCountry.country;
    document.getElementById('cardsLeft').innerText = `Zostáva krajín: ${deck.length}`;
    document.getElementById('currentPlayerDisplay').innerText = `Na rade: ${players[currentPlayerIndex].name}`;
    
    updateScoreUI();
    startTimer();
}

function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (!isPaused) {
            timeLeft--;
            document.getElementById('timerDisplay').innerText = `⏱️ ${timeLeft}`;
            if (timeLeft <= 10) document.getElementById('timerDisplay').classList.add('warning');
            if (timeLeft <= 0) handleTimeout();
        }
    }, 1000);
}

function togglePause() {
    if (isAnswerChecked) return;
    isPaused = !isPaused;
    const overlay = document.getElementById('pause-overlay');
    const content = document.getElementById('game-content');
    const btn = document.getElementById('pauseBtn');

    if (isPaused) {
        overlay.style.display = 'flex';
        content.style.opacity = '0.1';
        btn.innerText = "▶ Pokračovať";
        btn.style.backgroundColor = "var(--success)";
    } else {
        overlay.style.display = 'none';
        content.style.opacity = '1';
        btn.innerText = "⏸ Pauza";
        btn.style.backgroundColor = "var(--warning)";
        document.getElementById('capitalInput').focus();
    }
}

function checkAnswer() {
    if (isAnswerChecked || isPaused) return;
    isAnswerChecked = true;
    clearInterval(timerInterval);

    const input = document.getElementById('capitalInput');
    const userVal = normalize(input.value);
    const correctVal = normalize(currentCountry.capital);
    const box = document.getElementById('feedbackBox');

    input.disabled = true;
    document.getElementById('actionButtons').style.display = 'none';

    // 1. Definujeme si premennú pre čas čakania
    let delay;

    if (userVal === correctVal) {
        players[currentPlayerIndex].score++;
        box.innerHTML = "✅ SPRÁVNE!";
        box.classList.add('success');
        delay = 2000; // 2 sekundy pre správnu odpoveď
    } else {
        box.innerHTML = `❌ NESPRÁVNE!<br>Odpoveď: <span class="correct-answer-text">${currentCountry.capital}</span>`;
        box.classList.add('error');
        delay = 5000; // 5 sekúnd pre nesprávnu odpoveď
    }

    // 2. Použijeme premennú delay v setTimeout
    setTimeout(switchPlayer, delay); 
}

function giveUp() {
    if (isAnswerChecked || isPaused) return;
    isAnswerChecked = true;
    clearInterval(timerInterval);
    document.getElementById('actionButtons').style.display = 'none';
    document.getElementById('capitalInput').disabled = true;
    const box = document.getElementById('feedbackBox');
    box.innerHTML = `🏳️ PRESKOČENÉ<br>Odpoveď: <span class="correct-answer-text">${currentCountry.capital}</span>`;
    box.classList.add('error');
    setTimeout(switchPlayer, 6000);
}

function handleTimeout() {
    if (isAnswerChecked) return;
    isAnswerChecked = true;
    clearInterval(timerInterval);
    document.getElementById('actionButtons').style.display = 'none';
    document.getElementById('capitalInput').disabled = true;
    const box = document.getElementById('feedbackBox');
    box.innerHTML = `⏳ ČAS VYPRŠAL!<br>Odpoveď: <span class="correct-answer-text">${currentCountry.capital}</span>`;
    box.classList.add('error');
    setTimeout(switchPlayer, 6000);
}

function switchPlayer() {
    currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
    nextTurn();
}

function updateScoreUI() {
    const grid = document.getElementById('scoreGrid');
    grid.innerHTML = players.map((p, i) => `
        <div class="score-item ${i === currentPlayerIndex ? 'active-player' : ''}">
            <strong>${p.name}</strong><br>${p.score} b
        </div>
    `).join('');
}

function confirmEndGame() {
    const wasPaused = isPaused;
    if (!isPaused) togglePause();
    if (confirm("Chcete ukončiť hru a vidieť výsledky?")) {
        endGame();
    } else {
        if (!wasPaused) togglePause();
    }
}

function endGame() {
    clearInterval(timerInterval);
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('end-screen').classList.add('active');
    const sorted = [...players].sort((a,b) => b.score - a.score);
    document.getElementById('finalScoreList').innerHTML = sorted.map((p, i) => 
        `<p style="margin:10px 0; font-size:20px;">${i+1}. ${p.name}: <b>${p.score} bodov</b></p>`
    ).join('');
}
</script>
</body>
</html>
